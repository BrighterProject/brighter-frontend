name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

env:
  IMAGE: ghcr.io/brighterproject/brighter-frontend

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile

  build-push:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        if: github.ref == 'refs/heads/main'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:latest
          build-args: |
            VITE_GOOGLE_CLIENT_ID=${{ secrets.VITE_GOOGLE_CLIENT_ID }}
            VITE_TURNSTILE_SITE_KEY=${{ secrets.VITE_TURNSTILE_SITE_KEY }}
            VITE_SEO_INDEXABLE=${{ github.ref == 'refs/heads/main' && 'true' || '' }}
            VITE_UMAMI_SRC=${{ vars.VITE_UMAMI_SRC }}
            VITE_UMAMI_WEBSITE_ID=${{ vars.VITE_UMAMI_WEBSITE_ID }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  trigger-e2e:
    name: Trigger e2e suite
    runs-on: ubuntu-latest
    needs: [test]
    if: github.ref == 'refs/heads/dev' && github.event_name == 'push'
    steps:
      - uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.E2E_DISPATCH_TOKEN }}
          script: |
            await github.rest.repos.createDispatchEvent({
              owner: 'BrighterProject',
              repo: 'brighter-e2e',
              event_type: 'service-merged',
              client_payload: {
                service: '${{ github.repository }}',
                sha: '${{ github.sha }}'
              }
            })
